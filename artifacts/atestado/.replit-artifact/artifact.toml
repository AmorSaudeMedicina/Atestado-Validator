kind = "web"
previewPath = "/"
title = "Validador de Atestados"
version = "1.0.0"
id = "artifacts/atestado"
router = "path"
deploymentTarget = "vm"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18373

[services.development]
run = "python ../atestado-validator/server.py"

[services.env]
PORT = "18373"
BASE_PATH = "/"

[services.production]
run = "python artifacts/atestado-validator/server.py"

[services.production.health.startup]
path = "/healthz"
