[server]
port = 5000
address = "0.0.0.0"
headless = true
# CORS e XSRF precisam estar desabilitados no Replit porque o preview é servido
# via iframe num domínio diferente do servidor. Em produção fora do Replit,
# habilite enableCORS = true e enableXsrfProtection = true e adicione
# autenticação adequada antes de processar documentos reais.
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[theme]
# Tema claro forçado — identidade visual AmorSaúde.
# Sem esta seção, o Streamlit segue o esquema de cores do sistema/navegador
# do usuário, o que causava fundo escuro em navegadores com modo escuro ativo.
base = "light"
primaryColor = "#5FC2D4"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#EAF7F9"
textColor = "#525050"
font = "sans serif"
